<header class="topbar">
  <div class="topbar-left">
    <div class="brand">
      <img src="/logo.jpg" alt="BaseSaas Logo" class="brand-logo" />
      <span class="brand-name">BaseSaaS</span>
    </div>
  </div>

  <div class="topbar-right">
    <!-- Seletor de Idiomas (Dropdown Premium) -->
    <div class="lang-selector-wrapper">
      <p-select
        [options]="languages"
        [ngModel]="selectedLang()"
        (onChange)="onLangChange($event)"
        optionLabel="name"
        class="lang-select"
        aria-label="Select Language"
        appendTo="self"
      >
        <!-- Template do Item Selecionado -->
        <ng-template #selectedItem let-selectedOption>
          <div class="lang-option-selected">
            <i class="pi pi-globe lang-globe-icon" aria-hidden="true"></i>
            <span class="lang-name-short">{{ selectedOption.code.toUpperCase() }}</span>
          </div>
        </ng-template>

        <!-- Template dos Itens na Lista Suspensa -->
        <ng-template #item let-langOption>
          <div class="lang-option-item">
            <span class="lang-flag" aria-hidden="true">{{ langOption.flag }}</span>
            <span class="lang-name">{{ langOption.name | transloco }}</span>
          </div>
        </ng-template>
      </p-select>
    </div>

    <!-- Botão de Alternar Tema (Claro/Escuro) -->
    <button
      class="theme-toggle-btn"
      (click)="toggleTheme()"
      [attr.aria-label]="'TOPBAR.TOGGLE_THEME' | transloco"
      [title]="'TOPBAR.TOGGLE_THEME' | transloco"
    >
      <i class="pi" [class.pi-moon]="currentTheme() === 'light'" [class.pi-sun]="currentTheme() === 'dark'" aria-hidden="true"></i>
    </button>

    <!-- Perfil do Usuário e Ações -->
    @if (user()) {
      <div class="user-profile">
        <div class="user-details">
          <span class="user-name">{{ user()?.full_name || ('DASHBOARD.GUEST' | transloco) }}</span>
        </div>

        <div class="user-avatar">
          @if (user()?.avatar_url) {
            <img [src]="user()?.avatar_url" alt="Avatar" />
          } @else {
            <div class="avatar-placeholder">{{ user()?.email?.charAt(0)?.toUpperCase() }}</div>
          }
        </div>

        <button
          (click)="logout()"
          class="logout-button"
          [attr.aria-label]="'DASHBOARD.LOGOUT' | transloco"
          [title]="'DASHBOARD.LOGOUT' | transloco"
        >
          <i class="pi pi-sign-out" aria-hidden="true"></i>
        </button>
      </div>
    }
  </div>
</header>
