<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <img src="/logo.jpg" alt="BaseSaas Logo" class="auth-logo" />
      <h2 class="auth-title">{{ 'AUTH.LOGIN.TITLE' | transloco }}</h2>
      <p class="auth-subtitle">{{ 'AUTH.LOGIN.SUBTITLE' | transloco }}</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">{{ 'AUTH.EMAIL_LABEL' | transloco }}</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="seu-email@exemplo.com"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <div class="input-header">
          <label for="password">{{ 'AUTH.PASSWORD_LABEL' | transloco }}</label>
          <a routerLink="/forgot-password" class="auth-link-alt">{{ 'AUTH.FORGOT_PASSWORD_LINK' | transloco }}</a>
        </div>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          class="form-input"
        />
      </div>

      <button type="submit" [disabled]="isLoading() || loginForm.invalid" class="auth-btn">
        @if (isLoading()) {
          <span>{{ 'AUTH.LOADING' | transloco }}</span>
        } @else {
          <span>{{ 'AUTH.LOGIN.SUBMIT' | transloco }}</span>
        }
      </button>
    </form>

    <div class="auth-divider">
      <span>{{ 'AUTH.OR' | transloco }}</span>
    </div>

    <button (click)="onGoogleLogin()" [disabled]="isLoading()" class="social-btn google-btn">
      <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
        <path fill="#EA4335" d="M12 5.04c1.7 0 3.2.6 4.4 1.7l3.3-3.3C17.7 1.6 15 1 12 1 7.3 1 3.3 3.7 1.4 7.7l3.9 3C6.2 7.7 8.9 5.04 12 5.04z"/>
        <path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.7-.2-2.3H12v4.4h6.5c-.3 1.5-1.1 2.8-2.4 3.7l3.7 2.9c2.2-2 3.7-5 3.7-8.7z"/>
        <path fill="#FBBC05" d="M5.3 14.3c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2L1.4 7.3C.5 9.1 0 11.2 0 13.5s.5 4.4 1.4 6.2l3.9-3z"/>
        <path fill="#34A853" d="M12 23c3.2 0 6-1.1 8-2.9l-3.7-2.9c-1.1.7-2.5 1.2-4.3 1.2-3.1 0-5.8-2.66-6.7-5.66l-3.9 3C3.3 20.3 7.3 23 12 23z"/>
      </svg>
      <span>{{ 'AUTH.LOGIN.GOOGLE' | transloco }}</span>
    </button>

    <div class="auth-footer">
      <p>{{ 'AUTH.LOGIN.DONT_HAVE_ACCOUNT' | transloco }} <a routerLink="/register" class="auth-link">{{ 'AUTH.LOGIN.SIGNUP_LINK' | transloco }}</a></p>
    </div>
  </div>
</div>
