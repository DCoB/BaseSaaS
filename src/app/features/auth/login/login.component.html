<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <img src="/logo.jpg" alt="BaseSaas Logo" class="auth-logo" />
      <h2 class="auth-title">{{ 'AUTH.LOGIN.TITLE' | transloco }}</h2>
      <p class="auth-subtitle">{{ 'AUTH.LOGIN.SUBTITLE' | transloco }}</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">{{ 'AUTH.EMAIL_LABEL' | transloco }}</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="seu-email@exemplo.com"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <div class="input-header">
          <label for="password">{{ 'AUTH.PASSWORD_LABEL' | transloco }}</label>
          <a routerLink="/forgot-password" class="auth-link-alt">{{ 'AUTH.FORGOT_PASSWORD_LINK' | transloco }}</a>
        </div>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          class="form-input"
        />
      </div>

      <button type="submit" [disabled]="isLoading() || loginForm.invalid" class="auth-btn">
        @if (isLoading()) {
          <span>{{ 'AUTH.LOADING' | transloco }}</span>
        } @else {
          <span>{{ 'AUTH.LOGIN.SUBMIT' | transloco }}</span>
        }
      </button>
    </form>

    <div class="auth-divider">
      <span>{{ 'AUTH.OR' | transloco }}</span>
    </div>

    <button (click)="onGoogleLogin()" [disabled]="isLoading()" class="social-btn google-btn">
      <i class="pi pi-google google-icon" aria-hidden="true"></i>
      <span>{{ 'AUTH.LOGIN.GOOGLE' | transloco }}</span>
    </button>

    <div class="auth-footer">
      <p>{{ 'AUTH.LOGIN.DONT_HAVE_ACCOUNT' | transloco }} <a routerLink="/register" class="auth-link">{{ 'AUTH.LOGIN.SIGNUP_LINK' | transloco }}</a></p>
    </div>
  </div>
</div>
