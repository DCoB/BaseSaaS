<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2 class="auth-title">{{ 'AUTH.RESET_PASSWORD.TITLE' | transloco }}</h2>
      <p class="auth-subtitle">{{ 'AUTH.RESET_PASSWORD.SUBTITLE' | transloco }}</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="password">{{ 'AUTH.RESET_PASSWORD.NEW_PASSWORD_LABEL' | transloco }}</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="form-input"
        />
      </div>

      <button type="submit" [disabled]="isLoading() || resetForm.invalid" class="auth-btn">
        @if (isLoading()) {
          <span>{{ 'AUTH.LOADING' | transloco }}</span>
        } @else {
          <span>{{ 'AUTH.RESET_PASSWORD.SUBMIT' | transloco }}</span>
        }
      </button>
    </form>
  </div>
</div>
